<svg width="1000" height="760" style="max-width: 100%;" viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
}

#background {
  width: calc(100% - 20px);
  height: calc(100% - 20px);
  fill: white;
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
}

@media (prefers-color-scheme: dark) {
  #background {
    fill: #0d1117;
    stroke-width: 0.5px;
  }
}

.title {
  font-size: 32px;
  font-weight: 600;
  fill: rgb(36, 41, 46);
}

@media (prefers-color-scheme: dark) {
  .title { fill: #c9d1d9; }
}

.lang-name {
  font-size: 21px;
  font-weight: 600;
  fill: rgb(36, 41, 46);
}

@media (prefers-color-scheme: dark) {
  .lang-name { fill: #c9d1d9; }
}

.lang-pct {
  font-size: 17px;
  fill: rgb(88, 96, 105);
}

@media (prefers-color-scheme: dark) {
  .lang-pct { fill: #8b949e; }
}

.slice-label {
  font-size: 15px;
  font-weight: 600;
  fill: white;
  text-anchor: middle;
  dominant-baseline: central;
}

.legend-item {
  transform: translateX(-500%);
  animation: slideIn 2s ease-in-out forwards;
}

@keyframes slideIn {
  to { transform: translateX(0); }
}
</style>
</defs>
<rect x="10" y="10" id="background"/>
<text x="42" y="65" class="title">Languages Used (By File Size)</text>
{{ pie_slices }}
{{ legend }}
</svg>
